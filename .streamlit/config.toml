[theme]
base            = "dark"
backgroundColor         = "#0a0e1a"
secondaryBackgroundColor = "#111827"
primaryColor    = "#00d4ff"
textColor       = "#e2e8f0"
font            = "monospace"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
